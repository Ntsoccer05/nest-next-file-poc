name: Claude Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage-issue:
    # Issue が開かれたとき、Claude がラベル分類を自動実行
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage with Haiku
        uses: anthropics/claude-code-action@v1
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'issue-triage@claude-code-plugins'
          prompt: |
            claude-haiku-4-5-20251001 を使用して、CLAUDE.md の "Issue Triage Prompt" セクションに従って Issue を分類してください。

            【Issue情報】
            Repository: ${{ github.repository }}
            Issue Number: ${{ github.event.issue.number }}
            Title: ${{ env.ISSUE_TITLE }}
            Body: ${{ env.ISSUE_BODY }}
